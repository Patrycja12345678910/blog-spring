<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Blog</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>All Posts</h1>

<a href="/create">Add new post</a>

<ul>
    <li th:each="post : ${posts}">
        <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}"></a>
        - <span th:text="${post.author}"></span>
    </li>
</ul>

</body>
</html>
